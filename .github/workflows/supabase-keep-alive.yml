name: Supabase Keep Alive

on:
  schedule:
    # Roda todos os dias às 10:00 UTC (07:00 no Brasil)
    - cron: '0 10 * * *'
  # Permite rodar manualmente se precisar
  workflow_dispatch:

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Project
        run: |
          curl -I -s https://rdptufttwbgcckwledwx.supabase.co/auth/v1/health
